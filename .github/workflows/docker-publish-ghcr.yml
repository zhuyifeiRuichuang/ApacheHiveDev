name: Build and publish to GHCR
on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Make repository owner lowercase and export
        run: |
          echo "OWNER_LOWER=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Login to GHCR
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          # use GHCR_TOKEN secret (PAT) if present, otherwise fall back to GITHUB_TOKEN
          password: ${{ secrets.GHCR_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Build and push (ubuntu22)
        uses: docker/build-push-action@v4
        with:
          context: ./v3
          file: ./v3/Dockerfile.ubuntu22
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/${{ env.OWNER_LOWER }}/apachehive:ubuntu22-${{ github.sha }}
            ghcr.io/${{ env.OWNER_LOWER }}/apachehive:ubuntu22-latest
          cache-from: type=registry,ref=ghcr.io/${{ env.OWNER_LOWER }}/apachehive:cache-ubuntu22
          cache-to: type=registry,ref=ghcr.io/${{ env.OWNER_LOWER }}/apachehive:cache-ubuntu22,mode=max

      - name: Build and push (ubuntu25)
        uses: docker/build-push-action@v4
        with:
          context: ./v3
          file: ./v3/Dockerfile.ubuntu25
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/${{ env.OWNER_LOWER }}/apachehive:ubuntu25-${{ github.sha }}
            ghcr.io/${{ env.OWNER_LOWER }}/apachehive:ubuntu25-latest
          cache-from: type=registry,ref=ghcr.io/${{ env.OWNER_LOWER }}/apachehive:cache-ubuntu25
          cache-to: type=registry,ref=ghcr.io/${{ env.OWNER_LOWER }}/apachehive:cache-ubuntu25,mode=max
